kind = "web"
previewPath = "/"
title = "UID Manager"
version = "1.0.0"
id = "artifacts/uid-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18993

[services.development]
run = "pnpm --filter @workspace/uid-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uid-manager", "run", "build" ]
publicDir = "artifacts/uid-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18993"
BASE_PATH = "/"
