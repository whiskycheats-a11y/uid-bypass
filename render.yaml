services:
  - type: web
    name: uid-api-server
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/uid-manager run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: UID_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
