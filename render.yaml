services:
  - type: web
    name: uid-api-server
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable pnpm && pnpm install && pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: UID_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: uid-frontend
    env: static
    plan: free
    rootDir: .
    buildCommand: corepack enable pnpm && pnpm install && pnpm --filter @workspace/uid-manager build
    staticPublishPath: ./artifacts/uid-manager/dist/public
    envVars:
      - key: VITE_API_URL
        sync: false
